name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Type-check (mypy)
        run: mypy

      - name: Test
        run: pytest --cov=stride_analysis --cov=stride_s1a --cov-report=term-missing

      - name: Smoke-run S0 on the committed example
        run: stride-s0 --data-root examples/small_synthetic_dataset --output-dir /tmp/s0_ci

      - name: Smoke-run S1A on the S0 output
        run: stride-s1a --input-dir /tmp/s0_ci --output-dir /tmp/s1a_ci
